services:
  db:
    image: postgres:15.17-bookworm@sha256:550245350d614cd36d1a8e90d76c6f6608172659312e53417becbbe722aa4179
    # Pinned 2026-04-20. Multi-arch manifest-list digest (amd64+arm64). Update cadence: monthly. See docs/presentations/SETUP.md §"Cadencia de actualización de pins de Docker"
    environment:
      POSTGRES_USER: dotachile
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dotachile}
      POSTGRES_DB: dotachile
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dotachile"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
      - "4848:4848"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dotachile}
      SMTP_EMAIL: ${SMTP_EMAIL:-noreply@example.com}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-changeme}
    depends_on:
      db:
        condition: service_healthy
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - uploads:/home/dotachile/UPLOADS

volumes:
  pgdata:
  uploads:
